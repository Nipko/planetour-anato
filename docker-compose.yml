version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-formulario_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-Pl4n3t0ur_An4t0_2026}
      - POSTGRES_DB=${POSTGRES_DB:-formulario_anato}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-formulario_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-Pl4n3t0ur_An4t0_2026}
      - POSTGRES_DB=${POSTGRES_DB:-formulario_anato}
      - PORT=${PORT:-3000}
      - DB_HOST=db
      - DB_PORT=5432
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
