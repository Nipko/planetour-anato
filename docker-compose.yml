version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: formulario_user
      POSTGRES_PASSWORD: Pl4n3t0ur_An4t0_2026
      POSTGRES_DB: formulario_anato
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U formulario_user -d formulario_anato" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    environment:
      POSTGRES_USER: formulario_user
      POSTGRES_PASSWORD: Pl4n3t0ur_An4t0_2026
      POSTGRES_DB: formulario_anato
      PORT: "3000"
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - app

volumes:
  pgdata:
    driver: local
